name: E2E

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  create-cluster:
    runs-on: ubuntu-latest
    steps:
      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1
      - name: "Test kubectl get pods"
        run: |
          which kubectl
          ps aux | grep kube
          ps aux | grep container
          kubectl get nodes -o wide
          kubectl get pods -o wide -A
